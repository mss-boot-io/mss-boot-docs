name: (prod) Deploy docs

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Package Dist
        run: tar -czvf dist.tar.gz dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: dist.tar.gz
          retention-days: 3

  deployment:
    runs-on: ubuntu-latest
    needs: build
    name: deployment
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: docs

      - name: Unpack Artifact
        run: tar -xzvf dist.tar.gz

      - name: deploy prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.cf_api_token }}
          wranglerVersion: "4"
          command: deploy --env prod
